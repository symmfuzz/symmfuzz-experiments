NetworkTCPPort = 5158
MaxPDUSize = 16384
MaxAssociations = 16

HostTable BEGIN
#
# Peer mapping used by dcmqrti:
#   - symbolic name localscp resolves to AE ANY-SCP on localhost:5158
#
localscp = (ANY-SCP, localhost, 5158)
HostTable END

VendorTable BEGIN
#
# Optional vendor alias for interactive dcmqrti usage.
#
"LOCAL" = localscp
VendorTable END

AETable BEGIN
#
# Local database title managed by dcmqrscp.
# Peer restriction points to the symbolic host entry above so that
# dcmqrti can resolve AE titles for peer "localhost".
#
ANY-SCP /tmp/ACME_STORE RW (9, 1024mb) localscp

AETable END
