sink:
  bin-path: "/home/user/target/ft/consumer/lsquic/build/bin/http_server"
  env:
    - RUST_LOG: "trace"
    - FAKE_RANDOM: "1"
    - FAKE_TIME: "2026-03-11 12:00:00"
  arguments:
    - "-Q"
    - "hq-29"
    - "-s"
    - "127.0.0.1:4433"
    - "-c"
    - "localhost,/home/user/profuzzbench/cert/fullchain.crt,/home/user/profuzzbench/cert/server.key"
  working-dir: "/home/user/target/ft/consumer/lsquic"
  input-type: Udp
  output-type: Udp
  is-server: true
  server-port: "4433"
  server-ready-on: "Bind(0)"
  send-sigterm: true
  log-stdout: true
  log-stderr: true
  allow-unstable-sink: true
  persistent-server: false

gcov:
  bin-path: "/home/user/target/gcov/lsquic/build/bin/http_server"
  cwd: "/home/user/target/gcov/lsquic"
  env:
    - LD_PRELOAD: "libgcov_preload.so"
    - RUST_LOG: "trace"
    - FAKE_RANDOM: "1"
    - FAKE_TIME: "2026-03-11 12:00:00"
  src-dir: "/home/user/target/gcov/lsquic"
  reporter: "gcovr"
