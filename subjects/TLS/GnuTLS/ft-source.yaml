source:
  bin-path: "/home/user/target/ft/generator/gnutls/src/gnutls-cli"
  env:
    - LD_PRELOAD: "libfake_random.so"
    - FAKE_RANDOM: "1"
    - LD_LIBRARY_PATH: "/home/user/fuzztruction-net/target/release:/home/user/local/nettle/lib64:/home/user/local/nettle/lib"
  arguments: [
    "localhost:4433", 
    "--rehandshake", 
    "--starttls", 
    "--alpn=http/2",
    "--ocsp",
    "-b",
    "--x509cafile=/home/user/profuzzbench/cert/ca.crt",
    "--x509certfile=/home/user/profuzzbench/cert/client.crt",
    "--x509keyfile=/home/user/profuzzbench/cert/client.key",
    ]
  working-dir: "/home/user/target/ft/generator/gnutls"
  input-type: Tcp
  output-type: Tcp
  is-server: false
  log-stdout: true
  log-stderr: true
